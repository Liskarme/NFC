<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

/* 图片 */
img{
width:50vmin;
height:50vmin;
object-fit:cover;
}

/* 文字 */
#text{
position:absolute;
top:40px;
left:40px;
color:black;
font-size:70px;
font-weight:900;
opacity:0;
transition:opacity 1.5s;
font-family:sans-serif;
line-height:1.1;
}

</style>

</head>

<body>

<img src="IMG_5912.jpeg">

<div id="text">
Thank You For<br>
Your Support!
</div>

<script>

setTimeout(function(){
document.getElementById("text").style.opacity=1;
},1000);

</script>

</body>

</html>
