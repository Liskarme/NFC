<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  background:white;
  display:flex;
  justify-content:center; /* 水平居中 */
  align-items:center;     /* 垂直居中 */
  height:100vh;
  flex-direction:column;
}

/* 图片 */
img{
  width:50vmin;
  height:50vmin;
  object-fit:cover;
  opacity:0;
  transition:opacity 1.5s;
}

/* 文字 */
#text{
  color:black;
  font-size:70px;
  font-weight:900;
  opacity:0;
  transition:opacity 1.5s;
  font-family:sans-serif;
  line-height:1.1;
  margin-top:20px;
  text-align:center; /* 居中 */
}
</style>

</head>

<body>

<img id="image" src="image02.jpg">

<div id="text">
Thank You For<br>
Your Support!
</div>

<script>
// 图片延迟1秒显示
setTimeout(function(){
  document.getElementById("image").style.opacity=1;
},1000);

// 文字延迟1秒显示
setTimeout(function(){
  document.getElementById("text").style.opacity=1;
},1000);

</script>

</body>
</html>
